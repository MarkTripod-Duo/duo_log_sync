name: Release

# Trigger by pushing a version tag, e.g. `git tag v2.5.0 && git push origin v2.5.0`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Build sdist and wheel
        run: uv build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

  # ---------------------------------------------------------------------------
  # Optional: publish to PyPI via trusted publishing.
  #
  # DISABLED by default. The distribution name `duologsync` is (almost
  # certainly) already owned on PyPI by the upstream Duo project, so this fork
  # cannot publish under that exact name. To enable, EITHER:
  #   * publish under a distinct distribution name (change `[project].name` in
  #     pyproject.toml, e.g. `duologsync-standalone`), while keeping the import
  #     package `duologsync`; OR
  #   * use a private index / GitHub Packages.
  # Then configure a PyPI Trusted Publisher for this repo+workflow and remove
  # the `if: false` guard below.
  # ---------------------------------------------------------------------------
  pypi-publish:
    if: false
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
