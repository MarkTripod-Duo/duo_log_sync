name: CI

on:
  push:
    branches: [master]
  pull_request:

# Least-privilege by default.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: tests/TEST-duo_log_sync.xml
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Build sdist and wheel
        run: uv build
      - name: Verify service artifacts ship in the sdist
        run: |
          set -euo pipefail
          sdist=$(ls dist/*.tar.gz | head -1)
          echo "Inspecting ${sdist}"
          for expected in \
            "service/io.github.marktripod-duo.duologsync.plist" \
            "service/duologsync.service" \
            "install_service.sh" \
            "install_service.bat"; do
            if ! tar tzf "${sdist}" | grep -q "/${expected}$"; then
              echo "::error::missing ${expected} in sdist"
              exit 1
            fi
          done
          if tar tzf "${sdist}" | grep -q "/\.claude/"; then
            echo "::error::.claude leaked into sdist"
            exit 1
          fi
          echo "sdist contents verified"
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
